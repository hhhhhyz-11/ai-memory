<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 转 vCard 通讯录（智能版）</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #999;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #07c160;
            background: #f8f8f8;
        }
        .upload-area.dragover {
            border-color: #07c160;
            background: #e8f8e8;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 14px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #06ad56;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }
        .info strong {
            color: #333;
        }
        .preview {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .preview.show {
            display: block;
        }
        .preview-header {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .preview-item {
            padding: 8px 12px;
            background: #f5f5f5;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .preview-item .name {
            color: #333;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .preview-item .phone {
            color: #07c160;
            margin-left: 15px;
            flex-shrink: 0;
        }
        .preview-item .company {
            color: #999;
            font-size: 12px;
            margin-left: 10px;
            flex-shrink: 0;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .success {
            color: #07c160;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .success.show {
            display: block;
        }
        .stats {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 10px;
        }
        .stats strong {
            color: #07c160;
            font-size: 16px;
        }
        .error {
            color: #ff4d4f;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: #fff2f0;
            border-radius: 6px;
        }
        .error.show {
            display: block;
        }
        .debug {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 11px;
            color: #666;
            display: none;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .debug.show {
            display: block;
        }
        .mapping-info {
            margin-top: 15px;
            padding: 12px;
            background: #e8f8e8;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            display: none;
        }
        .mapping-info.show {
            display: block;
        }
        .mapping-info .tag {
            display: inline-block;
            padding: 2px 8px;
            background: #07c160;
            color: white;
            border-radius: 4px;
            margin: 2px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Excel 转 vCard 通讯录</h1>
        <p class="subtitle">智能识别列名，适用于各种 Excel 模板</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <p class="upload-text">点击或拖拽上传 Excel 文件</p>
            <p class="upload-hint">支持 .xlsx 和 .xls 格式</p>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        
        <div class="stats" id="stats"></div>
        <div class="mapping-info" id="mappingInfo"></div>
        <div class="error" id="errorMsg"></div>
        <div class="debug" id="debugMsg"></div>
        <div class="preview" id="preview">
            <div class="preview-header">预览（前10条）：</div>
        </div>
        
        <button class="btn" id="downloadBtn" disabled>下载 vcf 文件</button>
        
        <div class="success" id="successMsg">✅ 通讯录文件已生成，请导入手机</div>
        
        <div class="info">
            <strong>智能识别：</strong><br>
            • 手机号：自动匹配 11 位手机号（1[3-9]开头）<br>
            • 姓名：自动排除公司/集团/企业等关键词<br>
            • 公司：自动识别或使用姓名右侧列<br><br>
            <strong>无需指定模板，任意格式均可识别</strong>
        </div>
    </div>

    <script>
        let contacts = [];
        let vcfContent = '';
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const preview = document.getElementById('preview');
        const previewHeader = preview.querySelector('.preview-header');
        const successMsg = document.getElementById('successMsg');
        const statsEl = document.getElementById('stats');
        const errorMsg = document.getElementById('errorMsg');
        const debugMsg = document.getElementById('debugMsg');
        const mappingInfo = document.getElementById('mappingInfo');
        
        // 点击上传
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        // 手机号正则
        const PHONE_REG = /^1[3-9]\d{9}$/;
        
        // 公司关键词
        const COMPANY_KEYWORDS = ['公司', '集团', '企业', '有限', '股份', '工厂', '商行', '合作社', '事业单位'];
        
        // 判断是否像公司名
        function looksLikeCompany(text) {
            return COMPANY_KEYWORDS.some(kw => text.includes(kw));
        }
        
        // 判断是否像人名（排除公司名，且长度2-8字符）
        function looksLikePersonName(text) {
            if (looksLikeCompany(text)) return false;
            const len = text.replace(/[^\u4e00-\u9fa5]/g, '').length; // 中文字符数
            if (len < 2 || len > 8) return false;
            // 人名一般不包含数字、特殊符号（除点号外）
            if (/^\d+$/.test(text)) return false;
            return true;
        }
        
        // 清理手机号
        function cleanPhone(text) {
            if (!text) return '';
            // 只保留数字
            const digits = String(text).replace(/\D/g, '');
            return digits;
        }
        
        // 处理文件
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array', cellNF: true });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    const range = XLSX.utils.decode_range(firstSheet['!ref'] || 'A1');
                    const totalRows = range.e.r + 1;
                    const totalCols = range.e.c + 1;
                    
                    console.log('Sheet range:', firstSheet['!ref'], 'Rows:', totalRows, 'Cols:', totalCols);
                    
                    // 收集每列的数据样本（前20行）
                    const columnSamples = [];
                    for (let c = 0; c < totalCols; c++) {
                        const samples = [];
                        for (let r = 0; r < Math.min(20, totalRows); r++) {
                            const cell = firstSheet[XLSX.utils.encode_cell({ r: r, c: c })];
                            if (cell && cell.v !== undefined && cell.v !== null) {
                                samples.push(String(cell.v).trim());
                            }
                        }
                        columnSamples.push(samples);
                    }
                    
                    // 智能识别：找手机号列、姓名列、公司列
                    let phoneCol = -1;
                    let nameCol = -1;
                    let companyCol = -1;
                    
                    // 第一步：找手机号列（匹配率最高的列）
                    const phoneScores = columnSamples.map((samples, idx) => {
                        let score = 0;
                        samples.forEach(s => {
                            const cleaned = cleanPhone(s);
                            if (PHONE_REG.test(cleaned)) score++;
                        });
                        return { idx, score, samples };
                    });
                    phoneScores.sort((a, b) => b.score - a.score);
                    
                    if (phoneScores[0] && phoneScores[0].score > 0) {
                        phoneCol = phoneScores[0].idx;
                    }
                    
                    // 第二步：找姓名列（排除手机号列和公司列）
                    const nameCandidates = [];
                    for (let c = 0; c < totalCols; c++) {
                        if (c === phoneCol) continue;
                        
                        const samples = columnSamples[c];
                        let personCount = 0;
                        let companyCount = 0;
                        let emptyCount = 0;
                        
                        samples.forEach(s => {
                            if (!s) emptyCount++;
                            else if (looksLikeCompany(s)) companyCount++;
                            else if (looksLikePersonName(s)) personCount++;
                        });
                        
                        // 人名得分：人名数量高、公司数量低
                        if (personCount > 0 && personCount > companyCount) {
                            nameCandidates.push({
                                idx: c,
                                score: personCount - companyCount * 2,
                                personCount,
                                companyCount
                            });
                        }
                    }
                    
                    if (nameCandidates.length > 0) {
                        nameCandidates.sort((a, b) => b.score - a.score);
                        nameCol = nameCandidates[0].idx;
                    }
                    
                    // 第三步：找公司列
                    // 优先找包含"公司/集团"关键词的列
                    for (let c = 0; c < totalCols; c++) {
                        if (c === phoneCol || c === nameCol) continue;
                        
                        const samples = columnSamples[c];
                        const companyCount = samples.filter(s => looksLikeCompany(s)).length;
                        
                        if (companyCount >= 2) {  // 至少2个公司名
                            companyCol = c;
                            break;
                        }
                    }
                    
                    // 如果没找到公司列，试试姓名右侧一列
                    if (companyCol === -1 && nameCol !== -1 && nameCol + 1 < totalCols) {
                        const rightSamples = columnSamples[nameCol + 1];
                        const hasCompany = rightSamples.some(s => looksLikeCompany(s));
                        if (hasCompany) {
                            companyCol = nameCol + 1;
                        }
                    }
                    
                    console.log('Detected - phoneCol:', phoneCol, 'nameCol:', nameCol, 'companyCol:', companyCol);
                    console.log('Phone scores:', phoneScores.slice(0, 3));
                    console.log('Name candidates:', nameCandidates.slice(0, 3));
                    
                    // 如果关键列都没找到
                    if (phoneCol === -1 || nameCol === -1) {
                        const debugInfo = {
                            totalRows,
                            totalCols,
                            phoneScores: phoneScores.slice(0, 5),
                            nameCandidates: nameCandidates.slice(0, 5),
                            columnSamples: columnSamples.map((s, i) => ({ col: i, samples: s.slice(0, 5) }))
                        };
                        errorMsg.textContent = '无法自动识别列名，请确保 Excel 包含：手机号列 + 姓名列';
                        errorMsg.classList.add('show');
                        debugMsg.textContent = '调试信息：\n' + JSON.stringify(debugInfo, null, 2);
                        debugMsg.classList.add('show');
                        return;
                    }
                    
                    // 显示识别结果
                    const colLetters = [];
                    for (let c = 0; c < totalCols; c++) colLetters.push(String.fromCharCode(65 + c));
                    
                    let mappingHtml = '自动识别结果：';
                    mappingHtml += `<span class="tag">📞 列${colLetters[phoneCol]} 手机号</span>`;
                    mappingHtml += `<span class="tag">👤 列${colLetters[nameCol]} 姓名</span>`;
                    if (companyCol !== -1) {
                        mappingHtml += `<span class="tag">🏢 列${colLetters[companyCol]} 公司</span>`;
                    }
                    mappingInfo.innerHTML = mappingHtml;
                    mappingInfo.classList.add('show');
                    
                    contacts = [];
                    vcfContent = '';
                    preview.innerHTML = '<div class="preview-header">预览（前10条）：</div>';
                    errorMsg.classList.remove('show');
                    debugMsg.classList.remove('show');
                    
                    let count = 0;
                    let errorCount = 0;
                    let noPhoneCount = 0;
                    
                    // 逐行处理
                    for (let r = 0; r < totalRows; r++) {
                        const nameCell = firstSheet[XLSX.utils.encode_cell({ r: r, c: nameCol })];
                        const phoneCell = firstSheet[XLSX.utils.encode_cell({ r: r, c: phoneCol })];
                        
                        const name = nameCell ? String(nameCell.v || '').trim() : '';
                        let phoneRaw = phoneCell ? String(phoneCell.v || '').trim() : '';
                        
                        if (!name) continue;
                        
                        // 清理手机号
                        const phoneDigits = cleanPhone(phoneRaw);
                        
                        // 支持多种格式：纯11位、86+11位、带分号的多个号
                        let validPhone = '';
                        if (PHONE_REG.test(phoneDigits)) {
                            validPhone = phoneDigits;
                        } else {
                            // 试试用分号分隔的多个号
                            const parts = phoneRaw.split(/[;；,，]/);
                            for (const part of parts) {
                                const cleaned = cleanPhone(part);
                                if (PHONE_REG.test(cleaned)) {
                                    validPhone = cleaned;
                                    break;
                                }
                            }
                        }
                        
                        if (!validPhone) {
                            noPhoneCount++;
                            continue;
                        }
                        
                        // 获取公司名
                        let company = '';
                        if (companyCol !== -1) {
                            const companyCell = firstSheet[XLSX.utils.encode_cell({ r: r, c: companyCol })];
                            if (companyCell && companyCell.v) {
                                company = String(companyCell.v).trim();
                            }
                        }
                        
                        // 组合显示名
                        const displayName = company ? `${name}-${company}` : name;
                        
                        contacts.push({ name, phone: validPhone, company });
                        vcfContent += 'BEGIN:VCARD\n';
                        vcfContent += 'VERSION:3.0\n';
                        vcfContent += `FN:${displayName}\n`;
                        vcfContent += `TEL;TYPE=CELL:${validPhone}\n`;
                        if (company) {
                            vcfContent += `ORG:${company}\n`;
                        }
                        vcfContent += 'END:VCARD\n';
                        count++;
                        
                        // 预览只显示前10条
                        if (count <= 10) {
                            const companyTag = company ? `<span class="company">${company}</span>` : '';
                            preview.innerHTML += `<div class="preview-item"><span class="name">${name}</span>${companyTag}<span class="phone">${validPhone}</span></div>`;
                        }
                    }
                    
                    let statsHtml = `共找到 <strong>${count}</strong> 条有效联系人`;
                    if (errorCount > 0) statsHtml += `，跳过 <strong>${errorCount}</strong> 条无效号码`;
                    if (noPhoneCount > 0) statsHtml += `，<strong>${noPhoneCount}</strong> 条无手机号`;
                    statsEl.innerHTML = statsHtml;
                    
                    if (contacts.length > 0) {
                        preview.classList.add('show');
                        downloadBtn.disabled = false;
                        successMsg.classList.remove('show');
                    } else {
                        errorMsg.textContent = '未找到有效的联系人数据';
                        errorMsg.classList.add('show');
                    }
                } catch (err) {
                    console.error(err);
                    errorMsg.textContent = '文件解析失败：' + err.message;
                    errorMsg.classList.add('show');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        // 下载 vcf
        downloadBtn.addEventListener('click', () => {
            if (contacts.length === 0) return;
            
            const blob = new Blob([vcfContent], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `通讯录_${contacts.length}人.vcf`;
            a.click();
            URL.revokeObjectURL(url);
            
            successMsg.classList.add('show');
        });
    </script>
</body>
</html>
