auto-merge:
  stage: merge
  image: maven:3.9.6-eclipse-temurin-11
  variables:
    GITLAB_HOST: "http://192.168.0.43:8080"
  script:
    - apt-get update && apt-get install -y curl jq
    - |
      # 读取质量门状态
      STATUS=$(cat quality-gate.txt)
      echo "Quality Gate: $STATUS"

      # 读取质量统计数据
      source quality-stats.txt
      echo "Bugs: $BUGS, Vulns: $VULNS, Smells: $SMELLS"

      # 获取 MR 信息
      MR_INFO=$(curl -s --header "PRIVATE-TOKEN: $MERGE_TOKEN" "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID")
      MR_TITLE=$(echo "$MR_INFO" | jq -r '.title // "N/A"')
      MR_AUTHOR=$(echo "$MR_INFO" | jq -r '.author.username // "N/A"')
      STATE=$(echo "$MR_INFO" | jq -r '.state')
      MERGE_STATUS=$(echo "$MR_INFO" | jq -r '.merge_status')

      # 发送钉钉通知
      if [ "$STATUS" != "OK" ]; then
        curl -s "$DINGTALK_WEBHOOK" \
          -H 'Content-Type: application/json' \
          -d '{
        "msgtype": "markdown",
        "markdown": {
          "title": "❌ MR 质量门未通过",
          "text": "## ❌ MR 质量门未通过\n\n**项目:** '"$CI_PROJECT_NAME"'\n\n**MR:** [!'"$CI_MERGE_REQUEST_IID"']('"$GITLAB_HOST"'/ddc/gzddc/bike-server/merge_requests/'"$CI_MERGE_REQUEST_IID"')\n\n**标题:** '"$MR_TITLE"'\n\n**分支:** '"$CI_COMMIT_REF_NAME"' → '"$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"'\n\n**提交者:** '"$MR_AUTHOR"'\n\n**代码质量情况:**\n- 新增 Bugs: '"$BUGS"'\n- 新增 漏洞: '"$VULNS"'\n- 新增 异味: '"$SMELLS"'\n\n**质量门:** ❌ 未通过\n\n> 请修复问题后重新提交"
        }
      }'
        echo "Quality Gate 未通过，不允许合并"
        exit 1
      fi

      # 检查 MR 状态
      if [ "$STATE" != "opened" ] || [ "$MERGE_STATUS" != "can_be_merged" ]; then
        echo "MR 无法合并，跳过"
        exit 0
      fi

      # 执行合并
      curl -s --request PUT \
        --header "PRIVATE-TOKEN: $MERGE_TOKEN" \
        "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/merge"
  dependencies:
    - sonar-uat
    - sonar-master
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "uat"'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
