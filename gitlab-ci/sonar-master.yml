stages:
  - sonar_and_merge

sonarqube-and-merge-master:
  stage: sonar_and_merge
  image: sonar-ci:20260323

  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=/maven-repo/repository"
    GIT_DEPTH: "0"
    SONAR_HOST: "http://192.168.0.47:9000"
    GITLAB_HOST: "http://192.168.0.43:8080"
    MINIO_HOST: "192.168.0.180:9000"
    MINIO_BUCKET: "sonar-reports"

  script:
    - rm -f quality-gate.txt quality-stats.txt sonar-report.pdf issue-details.json minio-url.txt
    - |
      SONAR_PROJECT_KEY="bike-server-master-12.0.12"
      SONAR_PROJECT_TOKEN="$SONAR_MASTER"

      echo "Target: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME, Using Sonar: $SONAR_PROJECT_KEY"

      # 运行 Sonar 扫描
      mvn clean verify sonar:sonar \
      -Dsonar.projectKey=$SONAR_PROJECT_KEY \
      -Dsonar.host.url=$SONAR_HOST \
      -Dsonar.login=$SONAR_PROJECT_TOKEN \
      -Dsonar.pullrequest.key=$CI_MERGE_REQUEST_IID \
      -Dsonar.pullrequest.branch=$CI_COMMIT_REF_NAME \
      -Dsonar.pullrequest.base=$CI_MERGE_REQUEST_TARGET_BRANCH_NAME \
      -Dsonar.qualitygate.wait=true || true

      # 获取 Quality Gate 状态
      SCAN_RESULT=$(curl -s -u $SONAR_PROJECT_TOKEN: "$SONAR_HOST/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID")
      STATUS=$(echo "$SCAN_RESULT" | jq -r '.projectStatus.status // "UNKNOWN"')
      echo "$STATUS" > quality-gate.txt

      # 获取增量指标
      ISSUES_BUGS=$(curl -s -u $SONAR_PROJECT_TOKEN: "$SONAR_HOST/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID&types=BUG&newCode=true" | jq '.total // 0')
      ISSUES_VULNS=$(curl -s -u $SONAR_PROJECT_TOKEN: "$SONAR_HOST/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID&types=VULNERABILITY&newCode=true" | jq '.total // 0')
      ISSUES_SMELLS=$(curl -s -u $SONAR_PROJECT_TOKEN: "$SONAR_HOST/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID&types=CODE_SMELL&newCode=true" | jq '.total // 0')

      # 获取详细问题 JSON
      curl -s -u $SONAR_PROJECT_TOKEN: "$SONAR_HOST/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID&types=BUG,VULNERABILITY,CODE_SMELL&newCode=true&ps=500" > issue-details.json

      echo "BUGS=$ISSUES_BUGS" > quality-stats.txt
      echo "VULNS=$ISSUES_VULNS" >> quality-stats.txt
      echo "SMELLS=$ISSUES_SMELLS" >> quality-stats.txt

      # 获取评级
      REL_RATING=$(echo "$SCAN_RESULT" | jq -r '.projectStatus.conditions[] | select(.metricKey=="new_reliability_rating") | .actualValue // "N/A"')
      SEC_RATING=$(echo "$SCAN_RESULT" | jq -r '.projectStatus.conditions[] | select(.metricKey=="new_security_rating") | .actualValue // "N/A"')
      MAIN_RATING=$(echo "$SCAN_RESULT" | jq -r '.projectStatus.conditions[] | select(.metricKey=="new_maintainability_rating") | .actualValue // "N/A"')
      COVERAGE=$(echo "$SCAN_RESULT" | jq -r '.projectStatus.conditions[] | select(.metricKey=="new_coverage") | .actualValue // "N/A"')

      # 评级转字母
      RATING_MAP='{"1":"A","2":"B","3":"C","4":"D","5":"E"}'
      REL_LETTER=$(echo "$RATING_MAP" | jq -r ".\"$REL_RATING\" // \"N/A\"")
      SEC_LETTER=$(echo "$RATING_MAP" | jq -r ".\"$SEC_RATING\" // \"N/A\"")
      MAIN_LETTER=$(echo "$RATING_MAP" | jq -r ".\"$MAIN_RATING\" // \"N/A\"")

      SONAR_LINK="$SONAR_HOST/dashboard?id=$SONAR_PROJECT_KEY&pullRequest=$CI_MERGE_REQUEST_IID"

      # MR 评论
      curl -s --request POST \
      --header "PRIVATE-TOKEN: $MERGE_TOKEN" \
      --header "Content-Type: application/json" \
      --data "{
      \"body\": \"SonarQube Quality Gate: $STATUS\\n\\n**新增问题统计（本次MR）:**\\n- 新增 Bugs: $ISSUES_BUGS\\n- 新增 Vulnerabilities: $ISSUES_VULNS\\n- 新增 Code Smells: $ISSUES_SMELLS\\n\\n**质量门评级:**\\n- 可靠性: $REL_LETTER\\n- 安全性: $SEC_LETTER\\n- 可维护性: $MAIN_LETTER\\n- 覆盖率: $COVERAGE%\\n\\n[查看 SonarQube 分析]($SONAR_LINK)\"}" \
      "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"

      export SCAN_STATUS=$STATUS
      export ISSUES_BUGS
      export ISSUES_VULNS
      export ISSUES_SMELLS
      export SONAR_PROJECT_KEY
      export SONAR_LINK
      export CI_MERGE_REQUEST_IID
      export CI_COMMIT_REF_NAME
      export CI_MERGE_REQUEST_TARGET_BRANCH_NAME
      export CI_PROJECT_NAME
      export CI_PROJECT_PATH_SLUG

    - |
      python3 <<'PYEOF'
      import os, json
      from datetime import datetime
      from jinja2 import Template
      from weasyprint import HTML, CSS

      project_name = os.getenv("SONAR_PROJECT_KEY", "N/A")
      scan_date = datetime.now().strftime("%Y-%m-%d")
      quality_gate = os.getenv("SCAN_STATUS", "UNKNOWN")
      bugs = os.getenv("ISSUES_BUGS", "0")
      vulns = os.getenv("ISSUES_VULNS", "0")
      smells = os.getenv("ISSUES_SMELLS", "0")
      sonar_link = os.getenv("SONAR_LINK", "")
      mr_iid = os.getenv("CI_MERGE_REQUEST_IID", "N/A")
      source_branch = os.getenv("CI_COMMIT_REF_NAME", "N/A")
      target_branch = os.getenv("CI_MERGE_REQUEST_TARGET_BRANCH_NAME", "N/A")

      bugs_list, vulns_list, smells_list = [], [], []
      try:
          with open("issue-details.json", "r", encoding="utf-8") as f:
              for issue in json.load(f).get("issues", []):
                  t = issue.get("type", "")
                  item = {
                      "type": t, "message": issue.get("message", ""),
                      "file": issue.get("component", "").split("/")[-1],
                      "line": issue.get("line", ""),
                      "severity": issue.get("severity", ""),
                      "severity_cn": {"BLOCKER": "阻塞", "CRITICAL": "严重", "MAJOR": "主要", "MINOR": "次要", "INFO": "提示"}.get(issue.get("severity", ""), issue.get("severity", ""))
                  }
                  if t == "BUG": bugs_list.append(item)
                  elif t == "VULNERABILITY": vulns_list.append(item)
                  elif t == "CODE_SMELL": smells_list.append(item)
      except: pass

      bugs_list, vulns_list, smells_list = bugs_list[:10], vulns_list[:10], smells_list[:20]

      html = """<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SonarQube 增量分析报告</title><style>
      @page{size:A4;margin:1cm}body{font-family:"Noto Sans CJK SC",sans-serif;line-height:1.5;padding:10px;font-size:10pt}
      h1{text-align:center;color:#2c3e50;border-bottom:3px solid #3498db;padding-bottom:10px}
      h2{margin-top:15px;border-bottom:2px solid #3498db;padding-bottom:5px;color:#2c3e50;page-break-after:avoid}
      .info-box{background:#f8f9fa;padding:12px;border-radius:6px}
      table{width:100%;border-collapse:collapse;margin:10px 0}
      th,td{border:1px solid #bdc3c7;padding:6px 8px;text-align:left}
      th{background:#3498db;color:white}
      .status-error{color:#e74c3c;font-weight:bold}.status-ok{color:#27ae60;font-weight:bold}
      .metric-box{display:inline-block;padding:8px 15px;margin:5px;border-radius:6px;text-align:center;min-width:60px}
      .metric-bugs{background:#fadbd8;border-left:4px solid #e74c3c}
      .metric-vulns{background:#fdebd0;border-left:4px solid #f39c12}
      .metric-smells{background:#d6eaf8;border-left:4px solid #3498db}
      .metric-value{font-size:20px;font-weight:bold}
      .metric-label{font-size:10px;color:#666}
      .issue-section{page-break-inside:avoid;margin-bottom:15px}
      .severity-critical{color:#e74c3c;font-weight:bold}
      .severity-major{color:#f39c12}
      .severity-minor{color:#3498db}
      .footer{text-align:center;margin-top:20px;color:#7f8c8d;font-size:9pt}
      </style></head><body>
      <h1>📊 SonarQube 增量分析报告</h1>
      <div class="info-box"><table>
      <tr><th>项目</th><td>""" + project_name + """</td></tr>
      <tr><th>MR</th><td>!""" + mr_iid + """</td></tr>
      <tr><th>分支</th><td>""" + source_branch + """ → """ + target_branch + """</td></tr>
      <tr><th>分析日期</th><td>""" + scan_date + """</td></tr>
      </table></div>
      <h2>🔍 质量门状态</h2>
      <p class="{{'status-error' if quality_gate!='OK' else 'status-ok'}}">状态: {{'❌ 未通过' if quality_gate!='OK' else '✅ 通过'}}</p>
      <h2>📈 新增问题统计</h2>
      <div>
      <div class="metric-box metric-bugs"><div class="metric-value">""" + bugs + """</div><div class="metric-label">🐞 Bugs</div></div>
      <div class="metric-box metric-vulns"><div class="metric-value">""" + vulns + """</div><div class="metric-label">🔒 漏洞</div></div>
      <div class="metric-box metric-smells"><div class="metric-value">""" + smells + """</div><div class="metric-label">💨 异味</div></div>
      </div>"""

      for title, items in [("🐞 Bug 详情", bugs_list), ("🔒 漏洞详情", vulns_list), ("💨 代码异味详情", smells_list)]:
          if items:
              html += f"<h2>{title} ({len(items)})</h2><div class='issue-section'><table><tr><th>文件</th><th>行号</th><th>严重性</th><th>描述</th></tr>"
              for i in items:
                  html += f"<tr><td>{i['file']}</td><td>{i['line']}</td><td class='severity-{i['severity'].lower()}'>{i['severity_cn']}</td><td>{i['message'][:80]}</td></tr>"
              html += "</table></div>"

      html += f"""<div class="footer"><p>Generated by GitLab CI • {scan_date}</p><p><a href="{sonar_link}">查看 SonarQube 详细分析</a></p></div></body></html>"""
      HTML(string=html).write_pdf("sonar-report.pdf")
      PYEOF

    - |
      # 上传到 MinIO
      mc alias set minio http://$MINIO_HOST $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
      mc mb minio/$MINIO_BUCKET --ignore-existing 2>/dev/null || true
      mc anonymous set download minio/$MINIO_BUCKET 2>/dev/null || true
      
      FILE_NAME="${CI_PROJECT_NAME}/$(date +%Y-%m-%d)/sonar-report-${CI_PROJECT_NAME}-mr${CI_MERGE_REQUEST_IID}.pdf"
      mc cp sonar-report.pdf minio/$MINIO_BUCKET/$FILE_NAME
      MINIO_URL="http://${MINIO_HOST}/${MINIO_BUCKET}/${FILE_NAME}"
      echo "MINIO_URL=$MINIO_URL" > minio-url.txt
      echo "PDF 上传成功: $MINIO_URL"

      # 更新 MR 评论，添加 PDF 链接
      curl -s --request POST \
      --header "PRIVATE-TOKEN: $MERGE_TOKEN" \
      --header "Content-Type: application/json" \
      --data "{\"body\": \"## 📥 PDF 分析报告\\n\\n[📥 下载 PDF 报告]($MINIO_URL)\"}" \
      "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"

    - |
      # 读取状态
      STATUS=$(cat quality-gate.txt)
      source quality-stats.txt
      source minio-url.txt 2>/dev/null || true
      
      # 获取 MR 信息
      MR_INFO=$(curl -s --header "PRIVATE-TOKEN: $MERGE_TOKEN" "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID")
      MR_TITLE=$(echo "$MR_INFO" | jq -r '.title // "N/A"')
      MR_AUTHOR=$(echo "$MR_INFO" | jq -r '.author.username // "N/A"')
      STATE=$(echo "$MR_INFO" | jq -r '.state')
      MERGE_STATUS=$(echo "$MR_INFO" | jq -r '.merge_status')

      # 钉钉通知 & 合并
      if [ "$STATUS" != "OK" ]; then
      curl -s "$DINGTALK_WEBHOOK" \
      -H 'Content-Type: application/json' \
      -d '{
      "msgtype": "markdown",
      "markdown": {
      "title": "❌ MR 质量门未通过",
      "text": "## ❌ MR 质量门未通过\n\n**项目:** '"$CI_PROJECT_NAME"'\n\n**MR:** [!'"$CI_MERGE_REQUEST_IID"']('"$GITLAB_HOST"'/'"$CI_PROJECT_PATH"'/merge_requests/'"$CI_MERGE_REQUEST_IID"')\n\n**标题:** '"$MR_TITLE"'\n\n**分支:** '"$CI_COMMIT_REF_NAME"' → '"$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"'\n\n**提交者:** '"$MR_AUTHOR"'\n\n**代码质量:**\n- Bugs: '"$BUGS"'\n- 漏洞: '"$VULNS"'\n- 异味: '"$SMELLS"'\n\n**质量门:** ❌ 未通过\n\n**PDF报告:** '"$MINIO_URL"'\n\n> 请修复问题后重新提交"
      }
      }'
      echo "Quality Gate 未通过，不允许合并"
      exit 1
      fi

      if [ "$STATE" = "opened" ] && [ "$MERGE_STATUS" = "can_be_merged" ]; then
      echo "Quality Gate 通过，执行 MR 合并"
      curl -s --request PUT \
      --header "PRIVATE-TOKEN: $MERGE_TOKEN" \
      "$GITLAB_HOST/api/v4/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/merge"
      else
      echo "MR 状态不允许合并，跳过"
      fi

  artifacts:
    paths:
      - quality-gate.txt
      - quality-stats.txt
      - sonar-report.pdf
      - minio-url.txt
    expire_in: 30 minutes

  only:
    - merge_requests

  when: manual
